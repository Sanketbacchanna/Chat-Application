<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ChatWithMe - Private Chat</title>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6b73ff">
    <link rel="icon" type="image/png" href="/icons/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6c5ce7;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-color: #f0f2f5;
            --chat-bg: #ffffff;
            --me-bubble: #6c5ce7;
            --other-bubble: #f1f2f6;
            --text-main: #2d3436;
            --text-secondary: #636e72;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 15px;
            padding-top: calc(10px + env(safe-area-inset-top));
            display: flex;
            align-items: center;
            box-shadow: 0 1px 15px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .back-btn {
            text-decoration: none;
            color: var(--text-main);
            font-size: 24px;
            margin-right: 15px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: #f1f2f6;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--primary-gradient);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            box-shadow: 0 4px 8px rgba(108, 92, 231, 0.2);
        }

        .user-details h2 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
        }

        .user-details span {
            font-size: 12px;
            color: #00b894;
            font-weight: 500;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .action-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fd;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            font-size: 18px;
            color: var(--text-secondary);
        }

        .action-icon:hover {
            background: #f1f2f6;
            color: var(--primary-color);
        }

        /* Chat Area */
        #chatBox {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f8f9fd;
            /* Subtler background pattern */
            background-image: radial-gradient(rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 24px 24px;
            min-height: 0; /* Critical for flexbox shrinking on mobile */
        }

        .msg-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 75%;
        }

        .msg-wrapper.me {
            align-self: flex-end;
            align-items: flex-end;
        }

        .msg-wrapper.other {
            align-self: flex-start;
            align-items: flex-start;
        }

        .msg-bubble {
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 14.5px;
            line-height: 1.4;
            position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            word-wrap: break-word;
        }

        .me .msg-bubble {
            background: var(--primary-color);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .other .msg-bubble {
            background: white;
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            border: 1px solid #edf2f7;
        }

        .msg-time {
            font-size: 10px;
            margin-top: 5px;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        /* Input Area */
        .input-area {
            background: white;
            padding: 10px 12px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.03);
            position: relative;
            flex-shrink: 0; /* Prevent the input bar from being squeezed out */
            z-index: 20;
        }
        
        .input-wrapper {
            flex: 1;
            background: #f1f2f6;
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            border: 1px solid #edf2f7;
            min-width: 0; /* Important for flex-shrink */
        }

        #message {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px 0;
            font-size: 14px;
            outline: none;
            color: var(--text-main);
        }

        .btn-input {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            color: var(--text-secondary);
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-input:hover {
            color: var(--primary-color);
        }

        .btn-send {
            width: 44px;
            height: 44px;
            flex-shrink: 0;
            border-radius: 14px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
            transition: 0.2s;
        }

        .btn-send:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(108, 92, 231, 0.4);
        }

        /* Emoji Picker */
        #emojiPicker {
            display: none;
            position: absolute;
            bottom: 80px;
            left: 10px;
            right: 10px;
            background: white;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            z-index: 100;
            border: 1px solid #edf2f7;
            max-height: 250px;
            overflow-y: auto;
            width: auto;
        }

        #emojiPicker::-webkit-scrollbar {
            width: 5px;
        }

        #emojiPicker::-webkit-scrollbar-thumb {
            background: #dfe6e9;
            border-radius: 10px;
        }

        #emojiPicker span {
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #emojiPicker span:hover {
            transform: scale(1.2);
        }

        /* Recording UI */
        .recording-active {
            color: #ff7675 !important;
            animation: pulse-red 1.5s infinite;
        }

        @keyframes pulse-red {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Responsive */
        /* Video Call Modal */
        #videoContainer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 10000;
        }

        #closeVideoBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10001;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }

        @media (max-width: 480px) {
            .header { padding: 10px; }
            #chatBox { padding: 15px; }
            .msg-wrapper { max-width: 85%; }
        }
    </style>
</head>

    <script>
        const socket = io();
        const urlParams = new URLSearchParams(window.location.search);
        const contactName = urlParams.get('user') || 'Contact';
        const contactEmail = urlParams.get('email');

        document.getElementById('chatHeader').innerText = contactName;
        document.getElementById('userAvatar').innerText = contactName.charAt(0).toUpperCase();

        let myEmail = "";
        let myUsername = "";
        let roomId = "";

        // Session & Room Setup
        fetch('/api/me').then(res => res.json()).then(user => {
            if (user.email) {
                myEmail = user.email.toLowerCase();
                myUsername = user.username;
                if (contactEmail) {
                    roomId = [myEmail, contactEmail.toLowerCase()].sort().join('_');
                    socket.emit('join room', { room_id: roomId });
                }
            }
        });

        // Messaging
        function sendMessage() {
            const input = document.getElementById("message");
            const text = input.value.trim();
            if (!text || !roomId) return;

            const msgData = {
                room_id: roomId,
                sender_email: myEmail,
                username: myUsername,
                text: text
            };

            socket.emit("chat message", msgData);
            renderMessage({...msgData, timestamp: new Date().toISOString()}, true);
            input.value = "";
            input.focus();
        }

        function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }

        socket.on('chat history', (history) => {
            const box = document.getElementById("chatBox");
            box.innerHTML = '';
            history.forEach(msg => renderMessage(msg));
        });

        socket.on("chat message", (data) => {
            if (data.sender_email !== myEmail) renderMessage(data);
        });

        function renderMessage(data, isMe = false) {
            const box = document.getElementById("chatBox");
            const side = (isMe || data.sender_email === myEmail) ? 'me' : 'other';
            
            const timeString = data.timestamp 
                ? new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                : 'Just now';
            
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${side}`;
            wrapper.innerHTML = `
                <div class="msg-bubble">${data.text}</div>
                <div class="msg-time">${timeString}</div>
            `;
            box.appendChild(wrapper);
            box.scrollTop = box.scrollHeight;
        }

        // Features
        function toggleEmojiPicker() {
            const p = document.getElementById('emojiPicker');
            p.style.display = p.style.display === 'grid' ? 'none' : 'grid';
        }

        function addEmoji(e) {
            document.getElementById('message').value += e;
            toggleEmojiPicker();
        }

        let jitsiApi = null;
        function startVideoCall() {
            const container = document.getElementById('videoContainer');
            container.style.display = 'block';

            const domain = 'meet.jit.si';
            const options = {
                roomName: `CWM_${roomId}`,
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#jitsi-container'),
                userInfo: {
                    displayName: myUsername
                },
                configOverwrite: {
                    prejoinPageEnabled: false,
                    startWithAudioMuted: false,
                    startWithVideoMuted: false,
                    enableWelcomePage: false,
                    enableLobbyChat: false,
                    disableDeepLinking: true
                },
                interfaceConfigOverwrite: {
                    TILE_VIEW_MAX_COLUMNS: 8,
                    SHOW_JITSI_WATERMARK: false,
                    SHOW_WATERMARK_FOR_GUESTS: false
                }
            };
            
            jitsiApi = new JitsiMeetExternalAPI(domain, options);
            
            // Send the link to the other person too
            const link = `https://meet.jit.si/CWM_${roomId}`;
            socket.emit("chat message", { 
                room_id: roomId, 
                sender_email: myEmail, 
                username: myUsername, 
                text: `📞 Video Call Started. Click the camera icon above to join!` 
            });

            jitsiApi.addEventListeners({
                readyToClose: endVideoCall,
                videoConferenceLeft: endVideoCall
            });
        }

        function endVideoCall() {
            if (jitsiApi) {
                jitsiApi.dispose();
                jitsiApi = null;
            }
            document.getElementById('videoContainer').style.display = 'none';
            document.getElementById('jitsi-container').innerHTML = '';
        }

        // Voice Recording (Basic)
        let mediaRecorder;
        let audioChunks = [];
        async function toggleRecording() {
            const btn = document.getElementById('recordBtn');
            if (btn.classList.contains('recording-active')) {
                mediaRecorder.stop();
                btn.classList.remove('recording-active');
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.start();
                    btn.classList.add('recording-active');
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.readAsDataURL(blob);
                        reader.onloadend = () => {
                            const audioHtml = `<audio controls src="${reader.result}" style="width: 200px; height: 30px;"></audio>`;
                            socket.emit("chat message", { room_id: roomId, sender_email: myEmail, username: myUsername, text: audioHtml });
                            renderMessage({sender_email: myEmail, text: audioHtml}, true);
                        };
                        audioChunks = [];
                    };
                } catch (err) { alert("Mic access denied"); }
            }
        }
    </script>
</body>
