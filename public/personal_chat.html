<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ChatWithMe - Private Chat</title>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6b73ff">
    <link rel="icon" type="image/png" href="/icons/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-color: #6c5ce7;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-color: #f0f2f5;
            --chat-bg: #ffffff;
            --me-bubble: #6c5ce7;
            --other-bubble: #f1f2f6;
            --text-main: #2d3436;
            --text-secondary: #636e72;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            /* overflow: hidden; */
            background-color: var(--bg-color);
        }

        body {
            position: relative;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 15px;
            padding-top: calc(10px + env(safe-area-inset-top));
            display: flex;
            align-items: center;
            box-shadow: 0 1px 15px rgba(0, 0, 0, 0.05);
            position: relative;
            z-index: 2000;

            /*changed by me */
            height: 70px;
            flex-shrink: 0;
        }

        .back-btn {
            text-decoration: none;
            color: var(--text-main);
            font-size: 24px;
            margin-right: 15px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--primary-gradient);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            box-shadow: 0 4px 8px rgba(108, 92, 231, 0.2);
        }

        .user-details h2 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
        }

        .user-details span {
            font-size: 12px;
            color: #00b894;
            font-weight: 500;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .action-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fd;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            font-size: 18px;
            color: var(--text-secondary);
        }

        /* Chat Area */
        #chatBox {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f8f9fd;
            background-image: radial-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px);
            background-size: 24px 24px;
            min-height: 0;
            scroll-behavior: smooth;
            padding-bottom: 90px;
            position: relative;
            z-index: 1;
            /* height of input bar */
        }

        .msg-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }

        .msg-wrapper.me {
            align-self: flex-end;
            align-items: flex-end;
        }

        .msg-wrapper.other {
            align-self: flex-start;
            align-items: flex-start;
        }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            word-wrap: break-word;
            max-width: 100%;
        }

        .msg-bubble img {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 5px;
            display: block;
        }

        .msg-bubble a {
            color: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: underline;
        }

        .me .msg-bubble {
            background: var(--primary-color);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .other .msg-bubble {
            background: white;
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            border: 1px solid #edf2f7;
        }

        .msg-time {
            font-size: 10px;
            margin-top: 4px;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        /* Input Area */
        .input-area {
            background: white;
            padding: 8px 10px;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.03);
            z-index: 1000;
            flex-shrink: 0;
            min-height: 70px;
            position: fixed;
            /*i changed here */
            bottom: 0;
            left: 0;
            right: 0;
            pointer-events: auto;
        }

        .input-wrapper {
            flex: 1;
            background: #f1f2f6;
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 6px;
            border: 1px solid #edf2f7;
            min-width: 0;
        }

        #message {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px 0;
            font-size: 14px;
            outline: none;
            color: var(--text-main);
            min-width: 0;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            max-height: 80px;
            overflow-y: auto;
        }

        .btn-input {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 22px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-send {
            width: 46px;
            height: 46px;
            flex-shrink: 0;
            border-radius: 14px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
        }

        /* Emoji Picker */
        #emojiPicker {
            display: none;
            position: absolute;
            bottom: 80px;
            left: 10px;
            right: 10px;
            background: white;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            gap: 8px;
            z-index: 1000;
            border: 1px solid #edf2f7;
            max-height: 200px;
            overflow-y: auto;
        }

        #emojiPicker span {
            font-size: 24px;
            cursor: pointer;
            text-align: center;
        }

        /* Video/Call Modals - same as before */
        #videoContainer {
            display: none;
            position: fixed;
            inset: 0;
            background: #1a1a1a;
            z-index: 10000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #remoteVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #localVideo {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 100px;
            height: 140px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
            z-index: 10001;
        }

        .video-controls {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 20px;
            z-index: 10002;
        }

        .control-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hangup-btn {
            background: #ff4757;
        }

        .btn-off {
            background: rgba(255, 71, 87, 0.6) !important;
        }

        .call-status {
            position: absolute;
            top: 40px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 10002;
            animation: pulse-opacity 1.5s infinite;
        }

        @keyframes pulse-opacity {

            0%,
            100% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }
        }

        .incoming-call-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 11000;
            align-items: center;
            justify-content: center;
        }

        .incoming-call-content {
            background: white;
            padding: 40px;
            border-radius: 32px;
            text-align: center;
            width: 85%;
            max-width: 320px;
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .caller-avatar {
            width: 80px;
            height: 80px;
            border-radius: 24px;
            background: var(--primary-gradient);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            margin: 0 auto 20px;
        }

        .incoming-call-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .accept-btn,
        .reject-btn {
            flex: 1;
            padding: 14px;
            border-radius: 16px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            color: white;
        }

        .accept-btn {
            background: #2ed573;
        }

        .reject-btn {
            background: #ff4757;
        }

        .recording-active {
            color: #ff7675 !important;
            animation: pulse-red 1.5s infinite;
        }

        @keyframes pulse-red {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }
        }

        @media (max-width: 480px) {
            .msg-wrapper {
                max-width: 90%;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <a href="Chats.html" class="back-btn">←</a>
        <div class="user-info">
            <div class="avatar" id="userAvatar">?</div>
            <div class="user-details">
                <h2 id="chatHeader">Chat</h2>
                <span>Online</span>
            </div>
        </div>
        <div class="header-actions">
            <button class="action-icon" onclick="startVideoCall()" title="Video Call">📹</button>
            <button class="action-icon" onclick="startAudioCall()" title="Call">📞</button>
            <button class="action-icon" onclick="openUserInfo()" title="More Info">ℹ️</button>
        </div>
    </div>

    <div id="chatBox">
        <!-- Messages will appear here -->
    </div>

    <div id="emojiPicker">
        <span onclick="addEmoji('😀')">😀</span><span onclick="addEmoji('😃')">😃</span><span
            onclick="addEmoji('😄')">😄</span><span onclick="addEmoji('😁')">😁</span>
        <span onclick="addEmoji('😆')">😆</span><span onclick="addEmoji('😅')">😅</span><span
            onclick="addEmoji('🤣')">🤣</span><span onclick="addEmoji('😂')">😂</span>
        <span onclick="addEmoji('😊')">😊</span><span onclick="addEmoji('😇')">😇</span><span
            onclick="addEmoji('😍')">😍</span><span onclick="addEmoji('🥰')">🥰</span>
        <span onclick="addEmoji('😘')">😘</span><span onclick="addEmoji('😋')">😋</span><span
            onclick="addEmoji('😛')">😛</span><span onclick="addEmoji('😜')">😜</span>
        <span onclick="addEmoji('🤪')">🤪</span><span onclick="addEmoji('😎')">😎</span><span
            onclick="addEmoji('😏')">😏</span><span onclick="addEmoji('🥳')">🥳</span>
        <span onclick="addEmoji('👍')">👍</span><span onclick="addEmoji('❤️')">❤️</span><span
            onclick="addEmoji('🔥')">🔥</span><span onclick="addEmoji('✨')">✨</span>
    </div>

    <div class="input-area">
        <button class="btn-input" onclick="toggleEmojiPicker()">😀</button>
        <button class="btn-input" id="recordBtn" onclick="toggleRecording()">🎤</button>
        <div class="input-wrapper">
            <input type="text" id="message" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
            <button class="btn-input" title="Attach File"
                onclick="document.getElementById('fileInput').click()">📎</button>
            <input type="file" id="fileInput" style="display: none;" onchange="handleFileSelect(event)">
        </div>
        <button class="btn-send" onclick="sendMessage()">🚀</button>
    </div>

    <!-- Video Call UI -->
    <div id="videoContainer">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
        <div class="video-controls">
            <button class="control-btn toggle-mic" onclick="toggleMic()">🎤</button>
            <button class="control-btn toggle-video" onclick="toggleVideo()">📹</button>
            <button class="control-btn hangup-btn" onclick="endVideoCall()">📞</button>
        </div>
        <div id="callStatus" class="call-status">Connecting...</div>
    </div>

    <!-- Incoming Call Modal -->
    <div id="incomingCallModal" class="incoming-call-modal">
        <div class="incoming-call-content">
            <div class="caller-avatar" id="callerAvatar">?</div>
            <h3 id="callerName">Incoming Call...</h3>
            <div class="incoming-call-actions">
                <button class="accept-btn" onclick="acceptCall()">Accept</button>
                <button class="reject-btn" onclick="rejectCall()">Reject</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const urlParams = new URLSearchParams(window.location.search);
        const contactName = urlParams.get('user') || 'Contact';
        const contactEmail = urlParams.get('email');
        const autoAccept = urlParams.get('acceptCall') === 'true';

        document.getElementById('chatHeader').innerText = contactName;
        document.getElementById('userAvatar').innerText = contactName.charAt(0).toUpperCase();

        let myEmail = "";
        let myUsername = "";
        let roomId = "";

        // WebRTC Variables
        let localStream;
        let remoteStream;
        let peerConnection;
        let incomingCallData = null;
        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        // Session & Room Setup
        fetch('/api/me').then(res => res.json()).then(user => {
            if (user.email) {
                myEmail = user.email.toLowerCase();
                myUsername = user.username;
                if (contactEmail) {
                    roomId = [myEmail, contactEmail.toLowerCase()].sort().join('_');
                    socket.emit('join room', { room_id: roomId });
                    if (autoAccept) { setTimeout(() => { acceptCall(); }, 1000); }
                }
            }
        });

        // Messaging
        function sendMessage() {
            const input = document.getElementById("message");
            const text = input.value.trim();
            if (!text || !roomId) return;
            const msgData = { room_id: roomId, sender_email: myEmail, username: myUsername, text: text };
            socket.emit("chat message", msgData);
            renderMessage({ ...msgData, timestamp: new Date().toISOString() }, true);
            input.value = "";
            input.focus();
        }

        function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }

        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file || !roomId) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                const base64Data = e.target.result;
                let messageHtml = '';

                if (file.type.startsWith('image/')) {
                    messageHtml = `<img src="${base64Data}" alt="${file.name}">`;
                } else {
                    messageHtml = `<a href="${base64Data}" download="${file.name}">📄 ${file.name}</a>`;
                }

                const msgData = {
                    room_id: roomId,
                    sender_email: myEmail,
                    username: myUsername,
                    text: messageHtml
                };

                socket.emit("chat message", msgData);
                renderMessage({ ...msgData, timestamp: new Date().toISOString() }, true);
            };
            reader.readAsDataURL(file);
            event.target.value = ''; // Reset input
        }

        socket.on('chat history', (history) => {
            const box = document.getElementById("chatBox");
            box.innerHTML = '';
            history.forEach(msg => renderMessage(msg));
            box.scrollTop = box.scrollHeight;
        });

        socket.on("chat message", (data) => {
            if (data.sender_email !== myEmail) renderMessage(data);
        });

        function renderMessage(data, isMe = false) {
            const box = document.getElementById("chatBox");
            const side = (isMe || data.sender_email === myEmail) ? 'me' : 'other';
            const timeString = data.timestamp ? new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : 'Just now';
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${side}`;
            wrapper.innerHTML = `<div class="msg-bubble">${data.text}</div><div class="msg-time">${timeString}</div>`;
            box.appendChild(wrapper);
            box.scrollTop = box.scrollHeight;
        }

        // --- WebRTC Logic (Keep existing) ---
        async function startVideoCall() {
            try {
                document.getElementById('videoContainer').style.display = 'flex';
                document.getElementById('callStatus').innerText = "Requesting camera...";
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                createPeerConnection();
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                socket.emit('call-user', { to: contactEmail, offer: offer, from: myEmail, name: myUsername });
                document.getElementById('callStatus').innerText = "Calling " + contactName + "...";
            } catch (err) { console.error(err); alert("Could not access camera/mic"); endVideoCall(); }
        }

        function createPeerConnection() {
            peerConnection = new RTCPeerConnection(servers);
            remoteStream = new MediaStream();
            document.getElementById('remoteVideo').srcObject = remoteStream;
            peerConnection.ontrack = (event) => { event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track)); document.getElementById('callStatus').innerText = "In Call"; };
            peerConnection.onicecandidate = (event) => { if (event.candidate) { socket.emit('ice-candidate', { to: contactEmail, candidate: event.candidate }); } };
            peerConnection.oniceconnectionstatechange = () => { if (peerConnection.iceConnectionState === 'disconnected') endVideoCall(); };
        }

        socket.on('video-offer', async (data) => { incomingCallData = data; document.getElementById('callerName').innerText = data.name + " is calling..."; document.getElementById('callerAvatar').innerText = data.name.charAt(0).toUpperCase(); document.getElementById('incomingCallModal').style.display = 'flex'; });
        async function acceptCall() { document.getElementById('incomingCallModal').style.display = 'none'; document.getElementById('videoContainer').style.display = 'flex'; try { localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }); document.getElementById('localVideo').srcObject = localStream; createPeerConnection(); localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream)); await peerConnection.setRemoteDescription(new RTCSessionDescription(incomingCallData.offer)); const answer = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(answer); socket.emit('make-answer', { to: incomingCallData.from, answer: answer }); } catch (err) { console.error(err); alert("Error answering call"); endVideoCall(); } }
        function rejectCall() { document.getElementById('incomingCallModal').style.display = 'none'; socket.emit('reject-call', { to: incomingCallData.from }); incomingCallData = null; }
        socket.on('video-answer', async (data) => { await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer)); });
        socket.on('ice-candidate', async (data) => { if (peerConnection) { try { await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate)); } catch (e) { console.warn(e); } } });
        socket.on('call-rejected', () => { alert("Call rejected"); endVideoCall(); });
        socket.on('video-hangup', () => { endVideoCall(); });
        function endVideoCall() { if (peerConnection) { peerConnection.close(); peerConnection = null; } if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; } socket.emit('hangup', { to: contactEmail }); document.getElementById('videoContainer').style.display = 'none'; document.getElementById('incomingCallModal').style.display = 'none'; }
        function toggleMic() { const audioTrack = localStream.getAudioTracks()[0]; audioTrack.enabled = !audioTrack.enabled; document.querySelector('.toggle-mic').classList.toggle('btn-off', !audioTrack.enabled); }
        function toggleVideo() { const videoTrack = localStream.getVideoTracks()[0]; videoTrack.enabled = !videoTrack.enabled; document.querySelector('.toggle-video').classList.toggle('btn-off', !videoTrack.enabled); }
        function toggleEmojiPicker() { const p = document.getElementById('emojiPicker'); p.style.display = p.style.display === 'grid' ? 'none' : 'grid'; }
        function addEmoji(e) { document.getElementById('message').value += e; toggleEmojiPicker(); }

        let mediaRecorder; let audioChunks = [];
        async function toggleRecording() {
            const btn = document.getElementById('recordBtn');
            if (btn.classList.contains('recording-active')) { mediaRecorder.stop(); btn.classList.remove('recording-active'); }
            else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream); mediaRecorder.start(); btn.classList.add('recording-active');
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader(); reader.readAsDataURL(blob);
                        reader.onloadend = () => {
                            const audioHtml = `<audio controls src="${reader.result}" style="width: 200px; height: 30px;"></audio>`;
                            socket.emit("chat message", { room_id: roomId, sender_email: myEmail, username: myUsername, text: audioHtml });
                            renderMessage({ sender_email: myEmail, text: audioHtml }, true);
                        };
                        audioChunks = [];
                    };
                } catch (err) { alert("Mic access denied"); }
            }
        }
        // new added code by me
        function fixViewport() {
            document.body.style.height = window.innerHeight + "px";
        }

        window.addEventListener("resize", fixViewport);
        window.addEventListener("load", fixViewport);

        // ✅ ADD THIS BELOW
        if (window.visualViewport) {
            window.visualViewport.addEventListener("resize", () => {
                document.body.style.height = window.visualViewport.height + "px";
            });
        }
