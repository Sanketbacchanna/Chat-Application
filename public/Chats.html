<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Profiles</title>
    <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#d71920">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        a {
            text-decoration: none;
            color: black;
        }

        .profile-list {
            width: 100%;
            max-width: 500px;
        }

        .profile-container {
            display: flex;
            align-items: center;
            background-color: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .profile-pic img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 15px;
            object-fit: cover;
        }

        .profile-info h3 {
            font-size: 16px;
            color: #333;
        }

        .profile-info {
            flex-grow: 1;
        }

        @media (max-width: 600px) {
            .profile-container {
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 10px;
            }

            .profile-pic img {
                margin-bottom: 10px;
            }
        }
        /* for socket io */
        #chatBox {
    width: 100%;
    max-width: 500px;
    height: 250px;
    background: #fff;
    border: 1px solid #ccc;
    margin-bottom: 10px;
    padding: 10px;
    overflow-y: auto;
}

.me {
    text-align: right;
    color: blue;
    margin: 5px;
}

.other {
    text-align: left;
    color: green;
    margin: 5px;
}

    </style>
</head>

<body>
    <h2>CHATS</h2>
    <div class="profile-list" id="profileList">
        <!-- Friends will be dynamically loaded here -->
    </div>

    <script>
        window.onload = function () {
            const friendList = JSON.parse(localStorage.getItem('friends')) || [];
            const profileList = document.getElementById('profileList');

            if (friendList.length === 0) {
                profileList.innerHTML = '<p style="text-align:center; color:gray; margin-top:50px; font-size:18px;">You don\'t have any friends yet.</p>';
                return;
            }

            friendList.forEach(friend => {
                const link = document.createElement('a');
                const imgParam = friend.image ? `&image=${encodeURIComponent(friend.image)}` : '';
                link.href = `personal_chat.html?user=${encodeURIComponent(friend.name)}${imgParam}`;
                
                const profile = document.createElement('div');
                profile.className = 'profile-container';

                let avatarHtml = '';
                if (friend.image && friend.image.trim() !== '') {
                    avatarHtml = `<img src="${friend.image}" alt="${friend.name}" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover; margin-right: 15px;">`;
                } else {
                    const colors = ['#007bff', '#28a745', '#dc3545', '#ffc107', '#17a2b8', '#6610f2'];
                    const color = colors[friend.name.length % colors.length];
                    avatarHtml = `<div style="width: 50px; height: 50px; border-radius: 50%; background-color: ${color}; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; margin-right: 15px;">${friend.name.charAt(0).toUpperCase()}</div>`;
                }

                profile.innerHTML = `
                    ${avatarHtml}
                    <div class="profile-info">
                        <h3>${friend.name}</h3>
                    </div>
                `;
                
                link.appendChild(profile);
                profileList.appendChild(link);
            });
        };
        
        function startChat(name) {
            localStorage.setItem('chatWith', name);
            window.location.href = 'personal_chat.html?user=' + encodeURIComponent(name);
        }
    </script>
</body>
</html>
