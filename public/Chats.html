<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Profiles</title>
    <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#d71920">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        a {
            text-decoration: none;
            color: black;
        }

        .profile-list {
            width: 100%;
            max-width: 500px;
        }

        .profile-container {
            display: flex;
            align-items: center;
            background-color: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .profile-pic img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 15px;
            object-fit: cover;
        }

        .profile-info h3 {
            font-size: 16px;
            color: #333;
        }

        .profile-info {
            flex-grow: 1;
        }

        @media (max-width: 600px) {
            .profile-container {
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 10px;
            }

            .profile-pic img {
                margin-bottom: 10px;
            }
        }
        /* for socket io */
        #chatBox {
    width: 100%;
    max-width: 500px;
    height: 250px;
    background: #fff;
    border: 1px solid #ccc;
    margin-bottom: 10px;
    padding: 10px;
    overflow-y: auto;
}

.me {
    text-align: right;
    color: blue;
    margin: 5px;
}

.other {
    text-align: left;
    color: green;
    margin: 5px;
}

    </style>
</head>

<body>
    <div style="width: 100%; max-width: 500px; display: flex; align-items: center; margin-bottom: 20px;">
        <a href="homepage.html" style="font-size: 24px; margin-right: 15px;">←</a>
        <h2 style="margin: 0; flex: 1; text-align: center;">MY FRIENDS</h2>
    </div>
    <div class="profile-list" id="profileList">
        <!-- Friends will be dynamically loaded here -->
    </div>

    <script>
        window.onload = async function () {
            let friendList = [];
            try {
                const res = await fetch('/api/friends');
                friendList = await res.json();
                // Map DB fields to what we expect
                friendList = friendList.map(f => ({ name: f.friend_name, email: f.friend_email }));
                localStorage.setItem('friends', JSON.stringify(friendList));
            } catch (err) {
                console.log("Fetching from localStorage fallback");
                friendList = JSON.parse(localStorage.getItem('friends')) || [];
            }

            const profileList = document.getElementById('profileList');

            if (friendList.length === 0) {
                profileList.innerHTML = '<p style="text-align:center; color:gray; margin-top:50px; font-size:18px;">You don\'t have any friends yet.</p>';
                return;
            }

            friendList.forEach(friend => {
                const profile = document.createElement('div');
                profile.className = 'profile-container';

                const avatarHtml = `<div style="width: 50px; height: 50px; border-radius: 50%; background-color: #007bff; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; margin-right: 15px;">${friend.name.charAt(0).toUpperCase()}</div>`;

                profile.innerHTML = `
                    <div style="display: flex; align-items: center; flex: 1; cursor: pointer;" onclick="window.location.href='personal_chat.html?user=${encodeURIComponent(friend.name)}&email=${encodeURIComponent(friend.email)}'">
                        ${avatarHtml}
                        <div class="profile-info">
                            <h3>${friend.name}</h3>
                        </div>
                    </div>
                    <button onclick="removeFriend('${friend.email}', '${friend.name}')" style="background: #dc3545; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-left: 10px;">Remove</button>
                `;
                
                profileList.appendChild(profile);
            });
        };

        async function removeFriend(email, name) {
            if (confirm(`Remove ${name} from your friends?`)) {
                try {
                    const res = await fetch('/api/remove-friend', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ friend_email: email })
                    });

                    if (res.ok) {
                        // Refresh the list
                        location.reload();
                    } else {
                        alert("Failed to remove friend.");
                    }
                } catch (err) {
                    console.error(err);
                    alert("An error occurred.");
                }
            }
        }
        
        function startChat(name, email) {
            localStorage.setItem('chatWith', name);
            window.location.href = `personal_chat.html?user=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}`;
        }
    </script>
</body>
</html>
